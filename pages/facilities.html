<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페셜</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../common.css">
</head>
<body>
<nav id="nav"></nav>
<style>
/* 스페셜 콘텐츠 (큰 교차 레이아웃) */
.sp-item{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;margin-bottom:64px;}
.sp-item:nth-child(even){direction:rtl;}
.sp-item:nth-child(even) > *{direction:ltr;}
.sp-item img{width:100%;height:380px;object-fit:cover;}
.sp-tag{font-size:.72rem;font-weight:700;letter-spacing:.22em;color:var(--gl);margin-bottom:10px;}
.sp-name{font-family:"Nanum Myeongjo",serif;font-size:1.9rem;font-weight:800;margin-bottom:12px;}
.sp-desc{font-size:.95rem;color:#555;line-height:1.95;}
/* 부대시설 카드 */
.fac-detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:28px;margin-top:44px;}
.fdc{background:#fff;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);}
.fdc img{width:100%;height:220px;object-fit:cover;display:block;}
.fdc-body{padding:22px 20px 24px;}
.fdc-name{font-family:"Nanum Myeongjo",serif;font-size:1.35rem;font-weight:800;margin-bottom:6px;}
.fdc-sub{font-size:.74rem;font-weight:600;color:var(--g);letter-spacing:.06em;margin-bottom:10px;}
.fdc-detail{font-size:.92rem;color:#555;line-height:1.9;}
.fac-list-full{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:36px;}
.fli-full{display:flex;align-items:center;gap:10px;padding:15px 18px;background:#fff;font-size:.92rem;font-weight:500;border:1px solid #f0f0f0;}
.fli-full .ico{color:var(--g);font-weight:700;}
@media(max-width:860px){
  .sp-item{grid-template-columns:1fr;gap:24px;}
  .sp-item:nth-child(even){direction:ltr;}
  .sp-item img{height:240px;}
  .fac-detail-grid{grid-template-columns:1fr;}
  .fac-list-full{grid-template-columns:1fr 1fr;}
}
</style>

<div class="page-hero" style="background-image:url('../images/special/sunrise.jpg')">
  <div class="page-hero-content">
    <div class="page-breadcrumb"><a href="../index.html">Home</a> &middot; 스페셜</div>
    <h1 class="page-title">SPECIAL</h1>
  </div>
</div>

<section class="sw">
  <div class="cn">
    <div class="rv">
      <p class="slb">Only at ARA</p>
      <h2 class="sti">영덕 아라펜션만의 특별함</h2>
      <div class="dvd"></div>
      <p class="sds">동해바다가 선사하는 영덕만의 특별한 경험을 만나보세요.</p>
    </div>
    <div style="margin-top:52px" id="special-list"></div>
  </div>
</section>

<section class="sw" style="background:var(--cr)">
  <div class="cn">
    <div class="rv">
      <p class="slb">Facilities</p>
      <h2 class="sti">부대시설</h2>
      <div class="dvd"></div>
    </div>
    <div class="fac-detail-grid" id="fac-detail-grid"></div>
    <div style="margin-top:52px">
      <h3 style="font-family:'Nanum Myeongjo',serif;font-size:1.3rem;font-weight:800;margin-bottom:4px;">전체 편의시설</h3>
      <div class="dvd"></div>
      <div class="fac-list-full" id="fac-list-full"></div>
    </div>
  </div>
</section>

<footer id="footer"></footer>
<script src="../config.js"></script>
<script src="../common.js"></script>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); renderNav(); renderFooter();
  const im = CONFIG.images;

  // 스페셜 콘텐츠
  const sl = document.getElementById("special-list");
  (CONFIG.special||[]).forEach(s=>{
    const el=document.createElement("div");
    el.className="sp-item rv";
    el.innerHTML="<img src=\""+img(s.img)+"\" alt=\""+s.name+"\">"+
      "<div><div class=\"sp-tag\">"+s.tag+"</div>"+
      "<div class=\"sp-name\">"+s.name+"</div>"+
      "<p class=\"sp-desc\">"+s.desc+"</p></div>";
    sl.appendChild(el);
  });

  // 부대시설 카드
  const grid = document.getElementById("fac-detail-grid");
  CONFIG.facilities.forEach((f,i)=>{
    const el=document.createElement("div");
    el.className="fdc rv";
    el.innerHTML="<img src=\""+img(im.fac_cards[i]||"")+"\" alt=\""+f.name+"\">"+
      "<div class=\"fdc-body\">"+
      "<div class=\"fdc-name\">"+f.name+"</div>"+
      "<div class=\"fdc-sub\">"+f.sub+"</div>"+
      "<p class=\"fdc-detail\">"+f.detail+"</p></div>";
    grid.appendChild(el);
  });

  // 편의시설 목록
  const list = document.getElementById("fac-list-full");
  CONFIG.fac_list.forEach(f=>{
    const el=document.createElement("div");
    el.className="fli-full";
    el.innerHTML="<span class=\"ico\">·</span>"+f.text;
    list.appendChild(el);
  });

  initReveal();
});
</script>
</body>
</html>
