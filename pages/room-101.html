<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>객실 상세</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../common.css">
</head>
<body>
<nav id="nav"></nav>

<style>
/* 가격표 (상단) */
.rd-price-wrap{margin-bottom:40px;}
.rd-price-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;}
.rd-price-head .rd-no{font-family:"Cormorant Garamond",serif;font-size:2.4rem;font-weight:600;color:var(--gp);line-height:1;}
.rd-price-head .rd-name{font-family:"Nanum Myeongjo",serif;font-size:1.7rem;font-weight:800;}
.rd-price-head .rd-cap-inline{margin-left:auto;font-size:.86rem;color:#666;}
.rd-price-head .rd-cap-inline strong{color:var(--g);}
.price-table{width:100%;border-collapse:collapse;font-size:.92rem;}
.price-table th{background:var(--g);color:#fff;padding:13px 14px;text-align:center;font-weight:600;letter-spacing:.03em;}
.price-table td{padding:13px 14px;text-align:center;border-bottom:1px solid #e4e4e0;color:#444;}
.price-table .season-name{font-weight:700;color:#1c1c1c;background:#fafafa;}
.price-table .season-period{font-size:.74rem;color:#999;display:block;margin-top:2px;font-weight:400;}
.price-note{font-size:.78rem;color:#e03030;margin-top:8px;}

/* 이미지 + 정보 (2단) */
.rd-layout{display:grid;grid-template-columns:1.1fr 1fr;gap:56px;align-items:start;}
.rd-slider{position:relative;overflow:hidden;}
.rd-arr{position:absolute;top:calc(210px - 21px);z-index:5;background:rgba(0,0,0,.35);border:none;color:#fff;width:42px;height:42px;cursor:pointer;font-size:1.1rem;transition:background .2s;}
.rd-arr:hover{background:rgba(0,0,0,.6);}
.rd-arr-p{left:0;}.rd-arr-n{right:0;}
.rd-slides{display:flex;transition:transform .5s;}
.rd-slides img{width:100%;height:420px;object-fit:cover;flex-shrink:0;}
.rd-thumbs{display:flex;gap:6px;margin-top:6px;overflow-x:auto;padding-bottom:2px;}
.rd-thumbs::-webkit-scrollbar{height:5px;}
.rd-thumbs::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
.rd-thumb{flex:1 1 90px;min-width:90px;height:64px;object-fit:cover;cursor:pointer;opacity:.5;border:2px solid transparent;transition:opacity .2s;}
.rd-thumb.on{opacity:1;border-color:var(--g);}
.rd-name2{font-family:"Nanum Myeongjo",serif;font-size:1.5rem;font-weight:800;margin-bottom:14px;}
.rd-detail{font-size:.97rem;color:#555;line-height:1.95;margin-bottom:20px;}
.rd-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px;}
.rd-tag{background:var(--gp);color:var(--g);font-size:.74rem;font-weight:600;padding:5px 12px;}
.rd-cap{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#e4e4e0;border:1px solid #e4e4e0;margin-bottom:24px;}
.rd-cap-item{background:#fff;padding:16px;text-align:center;}
.rd-cap-lbl{font-size:.68rem;color:#aaa;letter-spacing:.1em;margin-bottom:5px;}
.rd-cap-val{font-size:.95rem;font-weight:700;}
.rd-rsv{display:block;background:var(--g);color:#fff;text-align:center;padding:15px;font-size:.9rem;font-weight:700;letter-spacing:.08em;text-decoration:none;transition:background .2s;}
.rd-rsv:hover{background:var(--g2);}
.rd-nav{display:flex;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid #e4e4e0;}
.rd-nav a{font-size:.85rem;color:var(--g);text-decoration:none;font-weight:600;letter-spacing:.04em;}
.rd-nav a:hover{text-decoration:underline;}
@media(max-width:860px){
  .rd-layout{grid-template-columns:1fr;gap:28px;}
  .rd-slides img{height:260px;}
  .rd-price-head{flex-wrap:wrap;}
  .rd-price-head .rd-cap-inline{margin-left:0;width:100%;}
  .price-table{font-size:.8rem;}
  .price-table th,.price-table td{padding:10px 6px;}
}
</style>

<div class="page-hero" id="page-hero">
  <div class="page-hero-content">
    <div class="page-breadcrumb"><a href="../index.html">Home</a> &middot; <a href="rooms.html">객실안내</a> &middot; <span id="t-room-name"></span></div>
    <h1 class="page-title" id="t-page-title"></h1>
  </div>
</div>
<div class="sub-tabs">
  <div class="sub-tabs-inner" id="room-tabs"></div>
</div>

<section class="sw">
  <div class="cn">
    <!-- 1. 가격표 (최상단) -->
    <div class="rd-price-wrap rv">
      <div class="rd-price-head">
        <span class="rd-no" id="t-no"></span>
        <span class="rd-name" id="t-rname"></span>
        <span class="rd-cap-inline" id="t-cap-inline"></span>
      </div>
      <table class="price-table" id="price-table"></table>
      <p class="price-note" id="t-price-note"></p>
    </div>

    <!-- 2. 이미지 + 정보 -->
    <div class="rd-layout rv">
      <div class="rd-slider">
        <button class="rd-arr rd-arr-p" onclick="rdGo(rdCur-1)">&#8592;</button>
        <button class="rd-arr rd-arr-n" onclick="rdGo(rdCur+1)">&#8594;</button>
        <div class="rd-slides" id="rd-slides"></div>
        <div class="rd-thumbs" id="rd-thumbs"></div>
      </div>
      <div>
        <div class="rd-name2" id="t-rname2"></div>
        <p class="rd-detail" id="t-rdetail"></p>
        <div class="rd-tags" id="t-rtags"></div>
        <div class="rd-cap" id="t-rcap"></div>
        <a href="" class="rd-rsv" id="t-rrsv">예약 문의하기</a>
      </div>
    </div>
    <div class="rd-nav" id="rd-nav"></div>
  </div>
</section>

<footer id="footer"></footer>
<script src="../config.js"></script>
<script src="../common.js"></script>
<script>
window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); renderNav(); renderFooter();
  renderRoomDetail();
  initReveal();
});

function renderRoomDetail(){
  const match = location.pathname.match(/room-(\d+)\.html/);
  if(!match) return;
  const no = match[1];
  const ri = CONFIG.rooms.findIndex(r => r.no === no);
  if(ri < 0) return;
  const r = CONFIG.rooms[ri];
  const im = CONFIG.images;

  document.title = r.no + "호 · " + r.name;
  document.getElementById("t-room-name").textContent = r.name;
  document.getElementById("t-page-title").textContent = r.no + "호 · " + r.name;
  document.getElementById("t-no").textContent = r.no;
  document.getElementById("t-rname").textContent = r.name;
  document.getElementById("t-rname2").textContent = r.name;
  document.getElementById("t-rdetail").textContent = r.detail;
  document.getElementById("t-rrsv").href = CONFIG.contact.kakao_url;
  document.getElementById("t-cap-inline").innerHTML = "기준 <strong>"+r.std+"</strong> / 최대 <strong>"+r.max+"</strong>";

  // 페이지 히어로 배경
  const firstImg = (im.rooms[ri]||[])[0]||"";
  document.getElementById("page-hero").style.backgroundImage = "url('" + img(firstImg) + "')";

  // 가격표
  const seasons = CONFIG.seasons || [];
  const pt = document.getElementById("price-table");
  let ph = "<tr><th>구분</th><th>평일 (일~목)</th><th>금요일</th><th>토요일 (공휴일 전날)</th></tr>";
  (r.price||[]).forEach((p,i)=>{
    const period = seasons[i] ? seasons[i].period : "";
    ph += "<tr><td class=\"season-name\">"+p.season+(period?"<span class=\"season-period\">"+period+"</span>":"")+"</td>"+
          "<td>"+p.weekday+"</td><td>"+p.friday+"</td><td>"+p.saturday+"</td></tr>";
  });
  pt.innerHTML = ph;
  document.getElementById("t-price-note").textContent = CONFIG.price_note || "";

  // 태그
  const tags = document.getElementById("t-rtags");
  r.amenities.forEach(a=>{
    const el=document.createElement("span");
    el.className="rd-tag"; el.textContent=a; tags.appendChild(el);
  });

  // 인원/구조 (3칸, 빈칸 없음)
  const cap = document.getElementById("t-rcap");
  [["기준 인원",r.std],["최대 인원",r.max],["구조","복층 독채"]].forEach(([lbl,val])=>{
    const el=document.createElement("div");
    el.className="rd-cap-item";
    el.innerHTML="<div class=\"rd-cap-lbl\">"+lbl+"</div><div class=\"rd-cap-val\">"+val+"</div>";
    cap.appendChild(el);
  });

  // 슬라이더
  const slides = document.getElementById("rd-slides");
  const thumbs = document.getElementById("rd-thumbs");
  const roomImgs = im.rooms[ri]||[];
  roomImgs.forEach((src,ii)=>{
    const s=document.createElement("img");
    s.src=img(src); s.alt=r.name;
    slides.appendChild(s);
    const t=document.createElement("img");
    t.className="rd-thumb"+(ii===0?" on":"");
    t.src=img(src);
    t.onclick=()=>rdSlide(ii,t);
    thumbs.appendChild(t);
  });
  startRdAuto(roomImgs.length);

  // 서브탭
  const tabs = document.getElementById("room-tabs");
  CONFIG.rooms.forEach(rm => {
    const a=document.createElement("a");
    a.className="sub-tab"+(rm.no===no?" on":"");
    a.href=href("pages/room-"+rm.no+".html");
    a.textContent=rm.tab;
    tabs.appendChild(a);
  });

  // 이전/다음
  const nav = document.getElementById("rd-nav");
  const prev = CONFIG.rooms[ri-1];
  const next = CONFIG.rooms[ri+1];
  nav.innerHTML =
    (prev ? "<a href=\""+href("pages/room-"+prev.no+".html")+"\">&larr; "+prev.tab+"</a>" : "<span></span>") +
    (next ? "<a href=\""+href("pages/room-"+next.no+".html")+"\">"+next.tab+" &rarr;</a>" : "<span></span>");
}

let rdCur=0, rdTotal=0, rdTimer;
function rdGo(ii){
  rdCur=(ii+rdTotal)%rdTotal;
  document.getElementById("rd-slides").style.transform="translateX(-"+(rdCur*100)+"%)";
  const thumbs=document.querySelectorAll(".rd-thumb");
  thumbs.forEach(t=>t.classList.remove("on"));
  if(thumbs[rdCur])thumbs[rdCur].classList.add("on");
  clearInterval(rdTimer);
  rdTimer=setInterval(()=>rdGo(rdCur+1),3500);
}
function rdSlide(ii, thumbEl){ rdGo(ii); }
function startRdAuto(total){
  rdTotal=total;
  if(total>1) rdTimer=setInterval(()=>rdGo(rdCur+1),3500);
}
</script>
</body>
</html>
