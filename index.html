<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펜션</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body>
<nav id="nav"></nav>

<style>
#hero{position:relative;height:100vh;height:100dvh;min-height:560px;overflow:hidden;margin-top:76px;}
.hsl{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1s;}
.hsl.on{opacity:1;}
.hov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.03),rgba(0,0,0,.58) 80%);}
.hct{position:absolute;bottom:90px;left:60px;right:60px;z-index:2;animation:fu .9s ease .2s both;}
.htag{display:inline-block;font-size:1rem;font-weight:700;letter-spacing:.15em;padding:7px 18px;margin-bottom:20px;background:var(--y);color:#1c1c1c;}
.hct h1{font-family:"Nanum Myeongjo",serif;font-size:clamp(3rem,7vw,5.4rem);font-weight:800;color:#fff;line-height:1.18;margin-bottom:16px;}
.hct h1 em{font-style:italic;color:var(--y);}
.hct p{font-size:1.2rem;color:rgba(255,255,255,.88);font-weight:300;line-height:1.7;margin-bottom:30px;}
.hbts{display:flex;gap:11px;}
.hb2{background:rgba(255,255,255,.12);color:#fff;border:1.5px solid rgba(255,255,255,.55);padding:14px 32px;font-size:.9rem;font-weight:600;letter-spacing:.06em;text-decoration:none;backdrop-filter:blur(4px);transition:all .2s;}
.hb2:hover{background:rgba(255,255,255,.25);}
.hdots{position:absolute;bottom:30px;left:60px;z-index:3;display:flex;gap:8px;}
.dot{width:22px;height:3px;background:rgba(255,255,255,.3);cursor:pointer;transition:background .3s,width .3s;}
.dot.on{background:#fff;width:40px;}
.harr{position:absolute;top:50%;z-index:3;transform:translateY(-50%);background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);color:#fff;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;}
.harr:hover{background:rgba(255,255,255,.28);}
.ha-p{left:18px;}.ha-n{right:18px;}
@keyframes fu{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.sec-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.sec-eng{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;letter-spacing:.04em;color:var(--g);}
.sec-more{font-size:.82rem;font-weight:600;color:#888;text-decoration:none;letter-spacing:.04em;transition:color .2s;}
.sec-more:hover{color:var(--g);}

#about{background:var(--cr);}
.abg{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;}
.abib{position:relative;height:420px;}
.abi-a{width:100%;height:100%;object-fit:cover;border-radius:8px;box-shadow:0 14px 40px rgba(0,0,0,.14);}
.abstamp{position:absolute;right:-14px;top:46%;transform:translateY(-50%);width:78px;height:78px;border-radius:50%;background:var(--y);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;text-align:center;line-height:1.5;z-index:2;}
.abpts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:24px;}
.abpt{background:#fff;padding:14px 15px;border-left:3px solid var(--gl);}
.abpt strong{display:block;font-size:.9rem;font-weight:700;margin-bottom:2px;}
.abpt span{font-size:.82rem;color:#666;}
.ab-readmore{display:inline-block;margin-top:24px;padding:11px 26px;border:1.5px solid var(--g);color:var(--g);font-size:.82rem;font-weight:600;letter-spacing:.04em;text-decoration:none;border-radius:30px;transition:all .2s;}
.ab-readmore:hover{background:var(--g);color:#fff;}

#room-info{background:#fff;}
.rp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.rp-card{position:relative;overflow:hidden;aspect-ratio:4/3;text-decoration:none;display:block;border-radius:6px;}
.rp-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.rp-card:hover img{transform:scale(1.05);}
.rp-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72),transparent 52%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px 18px;}
.rp-no{font-family:"Cormorant Garamond",serif;font-size:2.4rem;font-weight:600;color:rgba(255,255,255,.42);line-height:1;}
.rp-nm{font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:4px;}
.rp-ds{font-size:.82rem;color:rgba(255,255,255,.75);}
.rp-more-btn{display:block;width:fit-content;margin:36px auto 0;padding:13px 40px;background:var(--g);color:#fff;font-size:.88rem;font-weight:700;letter-spacing:.06em;text-decoration:none;border-radius:30px;transition:background .2s;}
.rp-more-btn:hover{background:var(--g2);}

#special{background:var(--cr);}
.sp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.sp-card{position:relative;overflow:hidden;aspect-ratio:16/10;border-radius:6px;cursor:pointer;}
.sp-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.sp-card:hover img{transform:scale(1.06);}
.sp-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72),transparent 58%);display:flex;flex-direction:column;justify-content:flex-end;padding:22px 22px;}
.sp-tag{font-size:.66rem;font-weight:700;letter-spacing:.18em;color:var(--y);margin-bottom:6px;}
.sp-nm{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:5px;}
.sp-ds{font-size:.83rem;color:rgba(255,255,255,.82);line-height:1.5;}

#bottom-info{position:relative;overflow:hidden;background-size:cover;background-position:center;}
#bottom-info::before{content:'';position:absolute;inset:0;background:rgba(14,40,30,.86);}
#bottom-info .cn{position:relative;z-index:1;}
.bi-grid{display:grid;grid-template-columns:1fr 1px 1fr;gap:48px;align-items:center;}
.bi-col{text-align:center;padding:20px;}
.bi-eng{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;letter-spacing:.06em;color:var(--y);margin-bottom:6px;}
.bi-ko{font-size:.78rem;color:rgba(255,255,255,.6);letter-spacing:.1em;margin-bottom:20px;}
.bi-main{font-size:1.15rem;color:#fff;font-weight:500;line-height:1.7;}
.bi-sub{font-size:.9rem;color:rgba(255,255,255,.65);line-height:1.7;margin-top:8px;}
.bi-divider{background:rgba(255,255,255,.15);height:100%;}
.bi-tel{font-size:1.7rem;font-weight:800;color:#fff;letter-spacing:.02em;margin-bottom:10px;}
.bi-bank{font-size:.95rem;color:rgba(255,255,255,.8);line-height:1.7;}

@media(max-width:860px){
  .abg{grid-template-columns:1fr;gap:28px;}
  .abib{height:250px;}.abstamp{display:none;}
  .rp-grid{grid-template-columns:1fr;}
  .sp-grid{grid-template-columns:1fr;}
  .hct{left:20px;right:20px;bottom:68px;}.hdots{left:20px;}
  .bi-grid{grid-template-columns:1fr;gap:32px;}
  .bi-divider{display:none;}
}
</style>

<section id="hero">
  <div id="hslides"></div>
  <div class="hov"></div>
  <div class="hct">
    <div class="htag" id="t-slogan"></div>
    <h1 id="t-h1"></h1>
    <p id="t-hsub"></p>
    <div class="hbts">
      <a href="" class="hb2" id="t-rooms-btn">객실 둘러보기</a>
    </div>
  </div>
  <button class="harr ha-p" onclick="hs(-1)">&#8592;</button>
  <button class="harr ha-n" onclick="hs(1)">&#8594;</button>
  <div class="hdots" id="hdots"></div>
</section>

<section class="sw" id="about">
  <div class="cn">
    <div class="abg">
      <div class="abib rv">
        <img class="abi-a" id="img-am" src="" alt="">
        <div class="abstamp">동해<br>오션뷰</div>
      </div>
      <div class="rv d1">
        <p class="slb">About Us</p>
        <h2 class="sti" id="t-atit"></h2>
        <div class="dvd"></div>
        <p class="sds" id="t-adesc"></p>
        <div class="abpts" id="abpts"></div>
        <a href="pages/about.html" class="ab-readmore" id="t-about-more">Read More +</a>
      </div>
    </div>
  </div>
</section>

<section class="sw" id="room-info">
  <div class="cn">
    <div class="sec-head rv">
      <div>
        <p class="slb">Room Guide</p>
        <div class="sec-eng">ROOM INFO</div>
      </div>
      <a href="pages/rooms.html" class="sec-more" id="t-room-shortcut">+ 더보기</a>
    </div>
    <div class="rp-grid rv" id="rp-grid"></div>
    <a href="pages/rooms.html" class="rp-more-btn" id="t-rooms-more">객실 더보기</a>
  </div>
</section>

<section class="sw" id="special">
  <div class="cn">
    <div class="sec-head rv">
      <div>
        <p class="slb">Only at ARA</p>
        <div class="sec-eng">SPECIAL POINT</div>
      </div>
      <a href="pages/facilities.html" class="sec-more">+ 바로가기</a>
    </div>
    <div class="sp-grid rv" id="sp-grid"></div>
  </div>
</section>

<section class="sw" id="bottom-info">
  <div class="cn">
    <div class="bi-grid">
      <div class="bi-col rv">
        <div class="bi-eng">ADDRESS</div>
        <div class="bi-ko">주소</div>
        <p class="bi-main" id="t-bi-addr"></p>
        <p class="bi-sub" id="t-bi-addr-sub"></p>
      </div>
      <div class="bi-divider"></div>
      <div class="bi-col rv d1">
        <div class="bi-eng">CALL / BANK</div>
        <div class="bi-ko">전화번호 / 계좌번호</div>
        <p class="bi-tel" id="t-bi-tel"></p>
        <p class="bi-bank" id="t-bi-bank"></p>
      </div>
    </div>
  </div>
</section>

<footer id="footer"></footer>
<script src="config.js"></script>
<script src="common.js"></script>
<script>
function renderIndex(){
  const p=CONFIG.pension, c=CONFIG.contact, im=CONFIG.images;
  document.title = p.name_ko;

  document.getElementById('t-rooms-btn').href = href('pages/rooms.html');
  document.getElementById('t-rooms-more').href = href('pages/rooms.html');
  document.getElementById('t-room-shortcut').href = href('pages/rooms.html');
  document.getElementById('t-about-more').href = href('pages/about.html');

  const slides = im.hero_slides || im.hero.map(s => ({img:s, tag:p.slogan, h1:p.hero_h1, em:p.hero_em, sub:p.hero_sub}));
  window.HERO_SLIDES = slides;
  const hs=document.getElementById('hslides'), hd=document.getElementById('hdots');
  slides.forEach((sl,i)=>{
    const s=document.createElement('div');
    s.className='hsl'+(i===0?' on':'');
    s.style.backgroundImage='url('+img(sl.img)+')';
    hs.appendChild(s);
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>goH(i);
    hd.appendChild(d);
  });
  setHeroText(0);

  document.getElementById('t-atit').innerHTML = p.intro_title;
  document.getElementById('t-adesc').textContent = p.intro_desc;
  document.getElementById('img-am').src = img(im.about_main);
  const abpts = document.getElementById('abpts');
  p.about_points.forEach(pt=>{
    const el=document.createElement('div');
    el.className='abpt';
    el.innerHTML='<strong>'+pt.title+'</strong><span>'+pt.desc+'</span>';
    abpts.appendChild(el);
  });

  const rpg = document.getElementById('rp-grid');
  CONFIG.rooms.slice(0,3).forEach((r,ri)=>{
    const el=document.createElement('a');
    el.className='rp-card';
    el.href=href('pages/room-'+r.no+'.html');
    const firstImg = (im.rooms[ri]||[])[0]||'';
    el.innerHTML='<img src="'+img(firstImg)+'" alt="'+r.name+'"><div class="rp-ov"><div class="rp-no">'+r.no+'</div><div class="rp-nm">'+r.name+'</div><div class="rp-ds">기준 '+r.std+' · 최대 '+r.max+'</div></div>';
    rpg.appendChild(el);
  });

  const sp=document.getElementById('sp-grid');
  // 스페셜 콘텐츠 + 부대시설 합치기
  const specialItems = (CONFIG.special||[]).map(s=>({img:s.img, tag:s.tag, nm:s.name, ds:s.desc}));
  const facItems = (CONFIG.facilities||[]).map((f,i)=>({img:(CONFIG.images.fac_cards[i]||''), tag:'FACILITY', nm:f.name, ds:f.detail||f.sub}));
  let allItems = specialItems.concat(facItems);
  // 짝수개로 맞추기 (홀수면 마지막 하나 제거)
  if(allItems.length % 2 !== 0) allItems = allItems.slice(0, allItems.length-1);
  allItems.forEach(s=>{
    const el=document.createElement('div');
    el.className='sp-card';
    el.onclick=()=>{location.href=href('pages/facilities.html');};
    el.innerHTML='<img src="'+img(s.img)+'" alt="'+s.nm+'"><div class="sp-ov"><div class="sp-tag">'+s.tag+'</div><div class="sp-nm">'+s.nm+'</div><div class="sp-ds">'+s.ds+'</div></div>';
    sp.appendChild(el);
  });

  document.getElementById('t-bi-addr').textContent = c.address;
  document.getElementById('t-bi-addr-sub').textContent = c.address_detail || '';
  document.getElementById('t-bi-tel').textContent = c.tel;
  document.getElementById('t-bi-bank').innerHTML = (c.bank||'') + (c.bank_holder ? '<br>'+c.bank_holder : '');
  document.getElementById('bottom-info').style.backgroundImage = "url('"+img(im.about_main)+"')";
}

let hcur=0, htmr;
function setHeroText(i){
  const slides = window.HERO_SLIDES || [];
  const s = slides[i];
  if(!s) return;
  const tEl=document.getElementById('t-slogan');
  const hEl=document.getElementById('t-h1');
  const pEl=document.getElementById('t-hsub');
  [tEl,hEl,pEl].forEach(el=>{el.style.transition='opacity .4s';el.style.opacity='0';});
  setTimeout(()=>{
    tEl.textContent = s.tag;
    hEl.innerHTML = s.h1 + '<br><em>' + s.em + '</em>';
    pEl.innerHTML = s.sub;
    [tEl,hEl,pEl].forEach(el=>{el.style.opacity='1';});
  },200);
}
function goH(n){
  const sl=document.querySelectorAll('.hsl'), dt=document.querySelectorAll('.dot');
  sl[hcur].classList.remove('on'); dt[hcur].classList.remove('on');
  hcur=(n+sl.length)%sl.length;
  sl[hcur].classList.add('on'); dt[hcur].classList.add('on');
  setHeroText(hcur);
  clearInterval(htmr); htmr=setInterval(()=>goH(hcur+1),4500);
}
function hs(d){goH(hcur+d);}

window.addEventListener('DOMContentLoaded',()=>{
  applyTheme(); renderNav(); renderFooter();
  renderIndex();
  initReveal();
  renderPopup();
  htmr=setInterval(()=>goH(hcur+1),4500);
});
</script>
</body>
</html>
